networks:
  siem-net:
    driver: bridge

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - siem-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - siem-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    restart: always  # Importante: para que si se apaga, vuelva a intentar
    environment:
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
      CONFIG_STRING: |
        input {
          beats {
            port => 5044
          }
        }
        output {
          elasticsearch {
            hosts => ["http://elasticsearch:9200"]
            index => "logstash-siem-%{+YYYY.MM.dd}"
          }
          stdout { codec => rubydebug }
        }
    # Forzamos a que el proceso se mantenga en primer plano correctamente
    command: logstash -e "${CONFIG_STRING}"
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch
    networks:
      - siem-net

  webvictim:
    image: nginx:latest
    container_name: webvictim
    ports:
      - "8080:80"
    volumes:
      - ./web_logs:/var/log/nginx
    networks:
      - siem-net

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: filebeat
    user: root
    command:
      - filebeat
      - -e
      - -strict.perms=false
      - -E
      - filebeat.config.inputs.path=/usr/share/filebeat/inputs.d/*.yml
    volumes:
      - ./web_logs:/var/log/nginx:ro
      - ./filebeat/inputs.d:/usr/share/filebeat/inputs.d:ro
    depends_on:
      - logstash
    restart: unless-stopped
    networks:
      - siem-net

volumes:
  esdata: